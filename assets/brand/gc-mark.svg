<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">GoreCode GC Monogram</title>
  <desc id="desc">Transparent SVG monogram with an intertwined dark blue G and light blue C.</desc>

  <defs>
    <linearGradient id="gDark" x1="80" y1="80" x2="430" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b3650"/>
      <stop offset="0.46" stop-color="#0d496b"/>
      <stop offset="1" stop-color="#082f48"/>
    </linearGradient>

    <linearGradient id="gLight" x1="160" y1="150" x2="395" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5ab9df"/>
      <stop offset="0.5" stop-color="#3f97bf"/>
      <stop offset="1" stop-color="#1b5f83"/>
    </linearGradient>

    <linearGradient id="edgeDark" x1="70" y1="70" x2="445" y2="445" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1d5f82"/>
      <stop offset="0.55" stop-color="#0b3149"/>
      <stop offset="1" stop-color="#061f30"/>
    </linearGradient>

  </defs>

  <g>
    <!-- Outer G -->
    <path
      d="M 399 100
         C 337 61 247 58 176 96
         C 96 139 56 223 74 307
         C 91 389 165 445 254 445
         C 337 445 407 400 434 329
         L 338 329
         C 317 353 286 366 252 366
         C 190 366 146 322 146 258
         C 146 194 190 148 253 148
         C 287 148 317 158 342 179
         Z
         M 296 239
         L 448 239
         C 454 239 459 244 459 250
         L 459 328
         C 459 334 454 339 448 339
         L 335 339
         C 329 339 324 334 324 328
         L 324 302
         L 296 302
         C 290 302 285 297 285 291
         L 285 250
         C 285 244 290 239 296 239
         Z"
      fill="url(#gDark)"
      stroke="url(#edgeDark)"
      stroke-width="5"
      stroke-linejoin="round"/>

    <!-- Inner C, interlocked over the G -->
    <path
      d="M 374 185
         C 381 185 386 190 386 197
         L 386 225
         C 386 232 381 237 374 237
         L 257 237
         C 235 237 217 253 217 273
         C 217 293 235 310 257 310
         L 316 310
         C 323 310 328 315 328 322
         L 328 350
         C 328 357 323 362 316 362
         L 253 362
         C 194 362 147 323 147 273
         C 147 223 194 185 253 185
         Z"
      fill="url(#gLight)"
      stroke="#17445f"
      stroke-width="4"
      stroke-linejoin="round"/>

    <!-- Subtle upper highlight on G -->
    <path
      d="M 115 255
         C 115 157 196 88 292 93
         C 235 102 185 128 154 172
         C 129 207 119 244 123 282"
      fill="none"
      stroke="#3f8cb1"
      stroke-width="10"
      stroke-linecap="round"
      opacity="0.32"/>

    <!-- Subtle highlight on C -->
    <path
      d="M 204 243
         C 218 222 239 214 265 214
         L 359 214"
      fill="none"
      stroke="#8bd4ee"
      stroke-width="9"
      stroke-linecap="round"
      opacity="0.33"/>
  </g>
</svg>
